name: Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  # One in-flight deploy per ref; don't cancel mid-deploy (wrangler + convex aren't idempotent).
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Resolve target
        id: target
        run: |
          REPO="${GITHUB_REPOSITORY##*/}"
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            echo "script=$REPO"          >> "$GITHUB_OUTPUT"
            echo "env_flag="              >> "$GITHUB_OUTPUT"
          else
            echo "script=${REPO}-acc"     >> "$GITHUB_OUTPUT"
            echo "env_flag=--env acc"     >> "$GITHUB_OUTPUT"
          fi

      - name: Push Convex + build Worker
        id: convex
        env:
          CONVEX_DEPLOY_KEY_PROD: ${{ secrets.CONVEX_DEPLOY_KEY_PROD }}
          CONVEX_DEPLOY_KEY_ACC:  ${{ secrets.CONVEX_DEPLOY_KEY_ACC }}
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            export CONVEX_DEPLOY_KEY="$CONVEX_DEPLOY_KEY_PROD"
          else
            export CONVEX_DEPLOY_KEY="$CONVEX_DEPLOY_KEY_ACC"
          fi
          # Tell convex deploy to expose its URL as VITE_CONVEX_URL (so Vite's
          # `import.meta.env.VITE_CONVEX_URL` gets baked into the client bundle
          # at build time), and derive the matching site URL. Then echo both to
          # step outputs so the next step can pass them as Worker runtime vars
          # — the Worker's SSR code reads them via `process.env.VITE_*`.
          bunx convex deploy --yes \
            --cmd-url-env-var-name VITE_CONVEX_URL \
            --cmd 'bash -c "
              export VITE_CONVEX_SITE_URL=\"\${VITE_CONVEX_URL%.cloud}.site\" &&
              echo \"convex_url=\$VITE_CONVEX_URL\" >> \"\$GITHUB_OUTPUT\" &&
              echo \"convex_site_url=\$VITE_CONVEX_SITE_URL\" >> \"\$GITHUB_OUTPUT\" &&
              bun run build
            "'

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler deploy ${{ steps.target.outputs.env_flag }} \
            --name "${{ steps.target.outputs.script }}" \
            --var "VITE_CONVEX_URL:${{ steps.convex.outputs.convex_url }}" \
            --var "VITE_CONVEX_SITE_URL:${{ steps.convex.outputs.convex_site_url }}"
